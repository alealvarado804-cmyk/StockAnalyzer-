<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>StockLens — Stock Analysis</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <!-- Instrument: Hanken Grotesk (sans/display) + Geist Mono (números). DM Sans queda como fallback cargado. -->
  <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700;800&family=Geist+Mono:wght@400;500;600&family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <!--
    Tokens de tema INLINE (fallback resiliente). Van ANTES de los <link> de ic-proxy
    a propósito: cuando ic-ui.css carga, sobreescribe estos (mismo valor → canónico);
    si ic-proxy se bloquea/cae, estos tokens mantienen el tema (sin dependencia cross-origin).
    Mantener en sync con ic-proxy/public/ic-ui.css y con IC-DataLayer/index.html.
  -->
  <style id="ic-tokens-fallback">
    /* Refleja ic-proxy/public/ic-ui.css (Instrument v2.0): --ic-* canónico + alias legacy.
       StockLens es dark-only (no inyecta tokens en runtime), pero se mantiene sincronizado. */
    :root {
      --ic-font-display: "Hanken Grotesk","DM Sans",system-ui,-apple-system,sans-serif;
      --ic-font-sans:    "Hanken Grotesk","DM Sans",system-ui,-apple-system,sans-serif;
      --ic-font-mono:    "Geist Mono",ui-monospace,"JetBrains Mono","SF Mono",monospace;
      --ic-display-weight: 700; --ic-display-tracking: -0.025em; --ic-mono-tracking: 0.14em;
      --ic-t-micro: 11px; --ic-t-label: 12px; --ic-t-sm: 13px; --ic-t-base: 14px;
      --ic-t-md: 16px; --ic-t-lg: 19px; --ic-t-xl: 24px; --ic-t-2xl: 32px; --ic-t-3xl: 44px; --ic-t-4xl: 60px;
      --ic-sp-1: 4px; --ic-sp-2: 8px; --ic-sp-3: 12px; --ic-sp-4: 16px; --ic-sp-5: 20px;
      --ic-sp-6: 24px; --ic-sp-7: 32px; --ic-sp-8: 40px; --ic-sp-9: 56px;
      --ic-radius-sm: 4px; --ic-radius: 6px; --ic-radius-lg: 8px; --ic-radius-pill: 999px; --ic-hair: 1px;
      --ic-bg: #15151c; --ic-surface: #1c1d26; --ic-surface-2: #24262f; --ic-surface-3: #2e2f3a;
      --ic-border: #33353f; --ic-border-strong: #4b4c58;
      --ic-text: #edeef4; --ic-text-2: #a6a7b1; --ic-text-3: #787a83;
      --ic-accent: #968ff7; --ic-accent-weak: #34315f; --ic-accent-fg: #15151c;
      --ic-pos: #5ac576; --ic-pos-weak: #194224; --ic-warn: #eca851; --ic-warn-weak: #54360b;
      --ic-neg: #eb6459; --ic-neg-weak: #602a25;
      --ic-shadow-sm: 0 1px 2px rgba(0,0,0,.35); --ic-shadow: 0 2px 8px rgba(0,0,0,.4); --ic-shadow-lg: 0 16px 40px rgba(0,0,0,.5);
      --bg-app: #15151c; --bg-card: var(--ic-surface); --bg-card-inner: var(--ic-surface-2);
      --bg-input: var(--ic-surface-2); --bg-hover: var(--ic-surface-3);
      --text-primary: #edeef4; --text-secondary: var(--ic-text-2); --text-muted: var(--ic-text-3); --text-inverse: var(--ic-accent-fg);
      --border-subtle: var(--ic-border); --border-focus: var(--ic-accent);
      --accent-success: var(--ic-pos); --accent-positive: var(--ic-pos); --accent-warn: var(--ic-warn);
      --accent-danger: var(--ic-neg); --accent-info: var(--ic-accent);
      --accent-action: var(--ic-accent); --accent-dashboard: var(--ic-accent); --accent-macro: var(--ic-accent);
      --accent-markets: var(--ic-accent); --accent-synthesis: var(--ic-accent); --accent-macro-alt: var(--ic-accent);
      --radius-card: var(--ic-radius); --radius-button: var(--ic-radius-sm); --radius-chip: var(--ic-radius-sm); --radius-pill: var(--ic-radius-pill);
      --font-family: var(--ic-font-sans);
      --shadow-card: var(--ic-shadow); --shadow-modal: var(--ic-shadow-lg);
      --font-size-caption: 10px; --font-size-micro: 11px; --font-size-sm: 12px;
      --font-size-body: 13px; --font-size-h3: 15px; --font-size-h2: 18px; --font-size-h1: 22px;
      --font-weight-regular: 400; --font-weight-medium: 500; --font-weight-semibold: 600; --font-weight-bold: 700;
      --line-height-tight: 1.2; --line-height-normal: 1.5;
      --space-1: 4px; --space-2: 8px; --space-3: 12px; --space-4: 14px; --space-5: 16px;
      --space-6: 20px; --space-8: 24px; --gap-sm: 8px; --gap-md: 12px; --gap-lg: 16px;
      --card-margin-bottom: 10px;
      --transition-fast: 120ms ease; --transition-normal: 200ms ease; --transition-slow: 300ms ease;
      --z-base: 1; --z-dropdown: 100; --z-sticky: 200; --z-modal: 300; --z-toast: 400;
      --color-lcc: #06B6D4; --color-csc: #FF6B35; --color-rpc: #EF4444;
      --color-grc: #F59E0B; --color-hsc: #8B5CF6;
      --color-regime-moderado: #F59E0B; --color-regime-restrictivo: #F97316;
      --color-regime-crisis: #EF4444; --color-regime-expansivo: #22c55e;
    }
    .ic-theme-light {
      --ic-bg: #f8f5f1; --ic-surface: #fffdfa; --ic-surface-2: #f3f0e9; --ic-surface-3: #ebe7df;
      --ic-border: #e1ded6; --ic-border-strong: #c2bdb4;
      --ic-text: #211c15; --ic-text-2: #605a52; --ic-text-3: #8a857e;
      --ic-accent: #5a58c2; --ic-accent-weak: #e5e9ff; --ic-accent-fg: #ffffff;
      --ic-pos: #2d8949; --ic-pos-weak: #d4f5da; --ic-warn: #c17924; --ic-warn-weak: #ffe5c5;
      --ic-neg: #c53732; --ic-neg-weak: #ffdfda;
      --ic-shadow-sm: 0 1px 2px rgba(60,50,30,.05); --ic-shadow: 0 1px 3px rgba(60,50,30,.06), 0 2px 8px rgba(60,50,30,.04); --ic-shadow-lg: 0 10px 30px rgba(60,50,30,.09);
      --bg-app: #f8f5f1; --text-primary: #211c15;
      --color-regime-restrictivo: #EA580C;
    }
  </style>

  <!-- Finance AI UI kit — tokens + componentes base (ic-proxy sobreescribe el fallback de arriba) -->
  <link rel="stylesheet" href="https://ic-proxy-psi.vercel.app/ic-ui.css">
  <link rel="stylesheet" href="https://ic-proxy-psi.vercel.app/ic-ui-components.css">
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{background:var(--bg-app, #15151c);color:var(--text-primary, #edeef4);min-height:100vh;font-family:var(--ic-font-sans, 'Hanken Grotesk','DM Sans',system-ui,-apple-system,sans-serif)}
    #root{background:var(--bg-app, #15151c);min-height:100vh}
  </style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="StockAnalyzer.js"></script>
</body>
</html>
